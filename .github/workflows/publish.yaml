name: Publish

on:
  push:
    tags:
      - "biome-config-v*"
      - "tsconfig-v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: jdx/mise-action@v2

      - name: Update npm to a version with trusted publishing
        run: npm install -g npm@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve package directory
        id: pkg
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [[ "$TAG" == biome-config-v* ]]; then
            echo "dir=packages/biome-config" >> "$GITHUB_OUTPUT"
          elif [[ "$TAG" == tsconfig-v* ]]; then
            echo "dir=packages/tsconfig" >> "$GITHUB_OUTPUT"
          else
            echo "Unknown tag prefix: $TAG" >&2
            exit 1
          fi

      - name: Publish to npm
        working-directory: ${{ steps.pkg.outputs.dir }}
        run: npm publish --access=public --provenance
